aid: apache-nutch
name: Apache Nutch
description: >-
  Apache Nutch is a highly extensible and scalable open-source web crawler software project
  built on Apache Hadoop data structures for batch processing. It provides a pluggable
  architecture supporting custom parse filters, scoring filters, index writers, and protocol
  implementations. Nutch integrates with Apache Solr and Elasticsearch for full-text search
  and exposes a REST API for managing crawl jobs, configurations, seed lists, and database
  queries. Governed by the Apache Software Foundation under the Apache License 2.0.
