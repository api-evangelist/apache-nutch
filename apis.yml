apis:
  - aid: apache-nutch:apache-nutch-rest-api
    name: Apache Nutch REST API
    description: >-
      REST API for managing Apache Nutch crawl jobs, configurations, seed URL lists,
      database queries (CrawlDB and FetchDB), and data readers. Supports full crawl
      lifecycle management including inject, generate, fetch, parse, updatedb, and index
      operations. Secured via HTTP Basic Authentication.
    humanURL: https://cwiki.apache.org/confluence/display/NUTCH/Nutch+1.X+REST+API
    baseURL: http://localhost:8081
